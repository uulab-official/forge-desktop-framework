appId: com.forge.authorityrepro26172
productName: Authority Repro 26172
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
extraResources:
  - from: resources/
    to: resources/
  - from: worker/dist/
    to: resources/worker/

fileAssociations:
  - ext: authorityrepro26172doc
    name: Authority Repro 26172 Document
    description: Open Authority Repro 26172 project documents
    role: Editor

publish:
  - provider: github
    owner: ${env.GH_OWNER:-your-github-org-or-user}
    repo: ${env.GH_REPO:-authorityrepro26172}
    private: true
    token: ${env.GH_TOKEN}

mac:
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  notarize:
    teamId: ${env.APPLE_TEAM_ID}

win:
  target: nsis
  signingHashAlgorithms:
    - sha256

linux:
  target: AppImage
