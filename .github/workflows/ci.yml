name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: pnpm prettier --check "packages/*/src/**/*.{ts,tsx}" "apps/app/src/**/*.{ts,tsx}"

      - name: Build packages
        run: pnpm build --filter='./packages/*'

      - name: Type check
        run: pnpm typecheck --filter='./packages/*'

      - name: Test packages
        run: pnpm test --filter='./packages/*'

      - name: Verify templates in sync
        if: matrix.os == 'ubuntu-latest'
        run: |
          bash scripts/sync-templates.sh
          git diff --exit-code packages/create-forge-app/templates/ || (echo "Templates out of sync! Run scripts/sync-templates.sh" && exit 1)

      - name: Verify scaffolded app builds
        if: matrix.os == 'ubuntu-latest'
        run: pnpm scaffold:test

  release-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pnpm install

      - name: Verify external scaffold installs
        run: pnpm scaffold:external:test

      - name: Audit official preset release surfaces
        run: pnpm release:audit

      - name: Verify release history index
        run: pnpm release:history:test

      - name: Verify rollback target selection
        run: pnpm release:rollback:target:test

      - name: Verify rollback history preparation
        run: pnpm release:rollback:prepare:test

      - name: Verify remote history rollback preparation
        run: pnpm release:history:remote:test

      - name: Verify remote rollback drill
        run: pnpm release:rollback:remote:test

      - name: Verify Forge 1.0 release gate
        run: pnpm release:onepointzero:test

      - name: Verify release status report
        run: pnpm release:status:test

      - name: Verify One Point Zero freeze report
        run: pnpm release:freeze:test

      - name: Verify One Point Zero decision report
        run: pnpm release:decision:test

      - name: Verify One Point Zero release candidate report
        run: pnpm release:rc:test

      - name: Verify One Point Zero major checklist preparation
        run: pnpm release:major:prepare:test

      - name: Verify One Point Zero promotion plan
        run: pnpm release:promotion:test

      - name: Verify One Point Zero major release runbook
        run: pnpm release:major:runbook:test

      - name: Verify One Point Zero major release approval
        run: pnpm release:major:approval:test

      - name: Verify One Point Zero major release cockpit
        run: pnpm release:major:cockpit:test

      - name: Verify One Point Zero major release packet
        run: pnpm release:major:packet:test

      - name: Verify One Point Zero major release signoff
        run: pnpm release:major:signoff:test

      - name: Verify One Point Zero major release board
        run: pnpm release:major:board:test

      - name: Verify One Point Zero major release verdict
        run: pnpm release:major:verdict:test

      - name: Verify One Point Zero major release authorization
        run: pnpm release:major:authorization:test

      - name: Verify One Point Zero major release warrant
        run: pnpm release:major:warrant:test

      - name: Verify One Point Zero major release launch sheet
        run: pnpm release:major:launch-sheet:test

      - name: Verify One Point Zero major release command card
        run: pnpm release:major:command-card:test

      - name: Verify One Point Zero major release preflight
        run: pnpm release:major:preflight:test

      - name: Verify One Point Zero major release trigger
        run: pnpm release:major:trigger:test

      - name: Verify One Point Zero major release rehearsal
        run: pnpm release:major:rehearsal:test

      - name: Verify One Point Zero major release go live
        run: pnpm release:major:go-live:test

      - name: Verify One Point Zero major release activation
        run: pnpm release:major:activation:test

      - name: Verify One Point Zero major release execution
        run: pnpm release:major:execution:test

      - name: Verify One Point Zero major release attestation
        run: pnpm release:major:attestation:test

      - name: Verify One Point Zero major release seal
        run: pnpm release:major:seal:test

      - name: Verify One Point Zero major release charter
        run: pnpm release:major:charter:test

      - name: Verify One Point Zero major release canon
        run: pnpm release:major:canon:test

      - name: Verify One Point Zero major release constitution
        run: pnpm release:major:constitution:test

      - name: Verify One Point Zero major release covenant
        run: pnpm release:major:covenant:test

      - name: Verify One Point Zero major release compact
        run: pnpm release:major:compact:test

      - name: Verify One Point Zero major release capsule
        run: pnpm release:major:capsule:test

      - name: Verify One Point Zero major release ledger
        run: pnpm release:major:ledger:test

      - name: Verify One Point Zero major release archive
        run: pnpm release:major:archive:test

      - name: Verify One Point Zero major release vault
        run: pnpm release:major:vault:test

      - name: Verify One Point Zero major release registry
        run: pnpm release:major:registry:test

      - name: Verify One Point Zero major release directory
        run: pnpm release:major:directory:test

      - name: Verify One Point Zero major release manifest
        run: pnpm release:major:manifest:test

      - name: Verify One Point Zero major release dossier
        run: pnpm release:major:dossier:test

      - name: Verify One Point Zero major release folio
        run: pnpm release:major:folio:test

      - name: Verify One Point Zero major release portfolio
        run: pnpm release:major:portfolio:test

      - name: Verify One Point Zero major release compendium
        run: pnpm release:major:compendium:test

      - name: Verify One Point Zero major release anthology
        run: pnpm release:major:anthology:test

      - name: Verify One Point Zero major release omnibus
        run: pnpm release:major:omnibus:test

      - name: Verify One Point Zero major release digest
        run: pnpm release:major:digest:test

      - name: Verify One Point Zero major release synopsis
        run: pnpm release:major:synopsis:test

      - name: Verify One Point Zero major release brief
        run: pnpm release:major:brief:test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install worker runtime
        run: pip install -e packages/worker-runtime

      - name: Test Python worker
        run: |
          echo '{"action":"health_check","payload":{}}' | python3 apps/worker/main.py 2>/dev/null | python3 -c "
          import json, sys
          lines = sys.stdin.read().strip().split('\n')
          for line in lines:
              data = json.loads(line)
              if 'success' in data:
                  assert data['success'] == True, f'Health check failed: {data}'
                  print('Health check passed:', data['data']['status'])
          "

      - name: Test all example workers
        run: bash scripts/test-workers.sh
