name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-worker:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: forge-worker-macos
          - os: windows-latest
            artifact: forge-worker-windows
          - os: ubuntu-latest
            artifact: forge-worker-linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build worker
        run: |
          cd python/worker
          pyinstaller --onefile --name forge-worker main.py

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: python/worker/dist/

  build-app:
    needs: build-worker
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            worker-artifact: forge-worker-macos
          - os: windows-latest
            worker-artifact: forge-worker-windows
          - os: ubuntu-latest
            worker-artifact: forge-worker-linux

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.worker-artifact }}
          path: python/worker/dist/

      - name: Package app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: pnpm --filter @forge/studio-shell package -- --publish always
