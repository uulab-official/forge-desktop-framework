name: Release

on:
  push:
    tags:
      - 'v*'

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  build-and-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
            platform: mac
            arch: arm64
          - os: macos-13
            platform: mac
            arch: x64
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm build --filter='./packages/*'

      - name: Build Python worker
        run: |
          pip install -e packages/worker-runtime
          cd apps/worker
          pip install pyinstaller
          pyinstaller --onefile --name forge-worker main.py

      - name: Build Electron app
        run: pnpm --filter @forge/app build

      - name: Audit signing readiness
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: bash scripts/audit-signing-readiness.sh "${{ matrix.platform }}" "${{ matrix.arch || 'default' }}" ".release-audit/${{ matrix.platform }}-${{ matrix.arch || 'default' }}"

      - name: Package Electron app (GitHub Releases)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: pnpm --filter @forge/app package -- --publish always

      - name: Summarize packaged artifacts
        shell: bash
        run: bash scripts/summarize-release-artifacts.sh apps/app/release "${{ matrix.platform }}" "${{ matrix.arch || 'default' }}"

      - name: Audit packaged artifacts
        shell: bash
        run: bash scripts/audit-published-artifacts.sh apps/app/release "${{ matrix.platform }}" "${{ matrix.arch || 'default' }}"

      - name: Audit release manifests
        shell: bash
        run: bash scripts/audit-release-manifests.sh apps/app/release "${{ matrix.platform }}" "${{ matrix.arch || 'default' }}" "${{ github.ref_name }}" 

      - name: Audit rollback readiness
        shell: bash
        run: bash scripts/audit-rollback-readiness.sh apps/app/release "${{ matrix.platform }}" "${{ matrix.arch || 'default' }}" "${{ github.ref_name }}"

      - name: Generate rollback playbook
        shell: bash
        run: bash scripts/generate-rollback-playbook.sh apps/app/release "${{ matrix.platform }}" "${{ matrix.arch || 'default' }}" "${{ github.ref_name }}"

      - name: Audit release channel recovery
        shell: bash
        run: bash scripts/audit-release-channel-recovery.sh apps/app/release "${{ matrix.platform }}" "${{ matrix.arch || 'default' }}" "${{ github.ref_name }}" github-only

      - name: Bundle release inventory
        shell: bash
        run: bash scripts/bundle-release-inventory.sh apps/app/release ".release-bundles" "${{ matrix.platform }}" "${{ matrix.arch || 'default' }}" "${{ github.ref_name }}"

      - name: Upload artifact inventory
        uses: actions/upload-artifact@v4
        with:
          name: release-inventory-${{ matrix.platform }}-${{ matrix.arch || 'default' }}
          path: |
            .release-audit/${{ matrix.platform }}-${{ matrix.arch || 'default' }}/signing-readiness.md
            .release-audit/${{ matrix.platform }}-${{ matrix.arch || 'default' }}/signing-readiness.json
            apps/app/release/artifact-summary.md
            apps/app/release/artifact-summary.json
            apps/app/release/manifest-audit.md
            apps/app/release/manifest-audit.json
            apps/app/release/publish-audit.md
            apps/app/release/publish-audit.json
            apps/app/release/rollback-readiness.md
            apps/app/release/rollback-readiness.json
            apps/app/release/rollback-playbook.md
            apps/app/release/rollback-playbook.json
            apps/app/release/channel-recovery.md
            apps/app/release/channel-recovery.json
            apps/app/release/latest*.yml
            .release-bundles/${{ matrix.platform }}-${{ matrix.arch || 'default' }}-v${{ github.ref_name }}

      - name: Snapshot GitHub release output for channel parity
        if: ${{ vars.S3_ENABLED == 'true' }}
        shell: bash
        run: |
          target=".release-audit/${{ matrix.platform }}-${{ matrix.arch || 'default' }}/github-release"
          rm -rf "$target"
          mkdir -p "$(dirname "$target")"
          cp -R apps/app/release "$target"

      - name: Upload to S3/R2
        if: ${{ vars.S3_ENABLED == 'true' }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'auto' }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_UPDATE_URL: ${{ secrets.S3_UPDATE_URL }}
        run: |
          TARGET_DIR=".release-audit/${{ matrix.platform }}-${{ matrix.arch || 'default' }}"
          RELEASE_DIR="apps/app/release"

          # Build with S3 publish config
          cd apps/app
          pnpm package -- -c electron-builder.s3.yml
          cd ../..

          rm -rf "$TARGET_DIR/s3-release"
          cp -R "$RELEASE_DIR" "$TARGET_DIR/s3-release"
          bash scripts/audit-publish-channel-parity.sh \
            "$TARGET_DIR/github-release" \
            "$TARGET_DIR/s3-release" \
            "${{ matrix.platform }}" \
            "${{ matrix.arch || 'default' }}" \
            "${{ github.ref_name }}"
          bash scripts/generate-rollback-playbook.sh \
            "$TARGET_DIR/s3-release" \
            "${{ matrix.platform }}" \
            "${{ matrix.arch || 'default' }}" \
            "${{ github.ref_name }}"
          bash scripts/audit-release-channel-recovery.sh \
            "$TARGET_DIR/s3-release" \
            "${{ matrix.platform }}" \
            "${{ matrix.arch || 'default' }}" \
            "${{ github.ref_name }}" \
            dual-channel
          bash scripts/bundle-release-inventory.sh \
            "$TARGET_DIR/s3-release" \
            ".release-bundles" \
            "${{ matrix.platform }}-s3" \
            "${{ matrix.arch || 'default' }}" \
            "${{ github.ref_name }}"

          aws s3 sync ".release-bundles/" "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/" \
            --endpoint-url $S3_ENDPOINT

          # Upload all release artifacts
          aws s3 sync "$RELEASE_DIR/" s3://$S3_BUCKET/releases/${{ github.ref_name }}/ \
            --endpoint-url $S3_ENDPOINT \
            --exclude "*.blockmap" \
            --exclude "builder-debug.yml"

          # Copy latest*.yml for auto-update discovery
          for f in "$RELEASE_DIR"/latest*.yml; do
            [ -f "$f" ] && aws s3 cp "$f" s3://$S3_BUCKET/releases/latest/ \
              --endpoint-url $S3_ENDPOINT
          done

      - name: Upload channel parity audit
        if: ${{ vars.S3_ENABLED == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: release-channel-parity-${{ matrix.platform }}-${{ matrix.arch || 'default' }}
          path: |
            .release-audit/${{ matrix.platform }}-${{ matrix.arch || 'default' }}/s3-release/channel-parity.md
            .release-audit/${{ matrix.platform }}-${{ matrix.arch || 'default' }}/s3-release/channel-parity.json
            .release-audit/${{ matrix.platform }}-${{ matrix.arch || 'default' }}/s3-release/rollback-playbook.md
            .release-audit/${{ matrix.platform }}-${{ matrix.arch || 'default' }}/s3-release/rollback-playbook.json
            .release-audit/${{ matrix.platform }}-${{ matrix.arch || 'default' }}/s3-release/channel-recovery.md
            .release-audit/${{ matrix.platform }}-${{ matrix.arch || 'default' }}/s3-release/channel-recovery.json
            .release-bundles/${{ matrix.platform }}-s3-${{ matrix.arch || 'default' }}-v${{ github.ref_name }}

  release-matrix-summary:
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Download release inventories
        uses: actions/download-artifact@v4
        with:
          pattern: release-inventory-*
          path: .release-matrix-artifacts

      - name: Summarize release matrix
        shell: bash
        run: bash scripts/summarize-release-matrix.sh .release-matrix-artifacts .release-matrix

      - name: Generate release bundle index
        shell: bash
        run: bash scripts/generate-release-bundle-index.sh .release-matrix-artifacts .release-matrix

      - name: Generate release provenance
        shell: bash
        run: bash scripts/generate-release-provenance.sh .release-matrix/release-matrix-summary.json .release-matrix "${{ github.ref_name }}" "${{ github.sha }}"

      - name: Audit Forge 1.0 readiness
        shell: bash
        run: bash scripts/audit-one-point-zero-readiness.sh .release-matrix

      - name: Generate release status report
        shell: bash
        run: bash scripts/generate-release-status-report.sh .release-matrix/one-point-zero-readiness.json .release-matrix/release-matrix-summary.json .release-matrix/release-provenance.json .release-matrix

      - name: Generate One Point Zero freeze report
        shell: bash
        run: bash scripts/generate-one-point-zero-freeze-report.sh .release-matrix/release-status.json "docs/release-checklists/${{ github.ref_name }}.md" .release-matrix

      - name: Generate One Point Zero decision report
        shell: bash
        run: bash scripts/generate-one-point-zero-decision-report.sh .release-matrix/one-point-zero-readiness.json .release-matrix/release-status.json .release-matrix/one-point-zero-freeze.json .release-matrix

      - name: Generate One Point Zero release candidate report
        shell: bash
        run: bash scripts/generate-one-point-zero-release-candidate-report.sh .release-matrix/one-point-zero-decision.json .release-matrix

      - name: Upload release bundle metadata to S3/R2
        if: ${{ vars.S3_ENABLED == 'true' }}
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'auto' }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
        run: |
          aws s3 cp .release-matrix/release-bundle-index.md "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/release-bundle-index.md" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/release-bundle-index.json "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/release-bundle-index.json" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/release-matrix-summary.md "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/release-matrix-summary.md" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/release-matrix-summary.json "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/release-matrix-summary.json" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/release-provenance.md "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/release-provenance.md" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/release-provenance.json "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/release-provenance.json" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/one-point-zero-readiness.md "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/one-point-zero-readiness.md" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/one-point-zero-readiness.json "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/one-point-zero-readiness.json" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/release-status.md "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/release-status.md" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/release-status.json "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/release-status.json" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/one-point-zero-freeze.md "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/one-point-zero-freeze.md" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/one-point-zero-freeze.json "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/one-point-zero-freeze.json" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/one-point-zero-decision.md "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/one-point-zero-decision.md" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/one-point-zero-decision.json "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/one-point-zero-decision.json" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/one-point-zero-release-candidate.md "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/one-point-zero-release-candidate.md" \
            --endpoint-url $S3_ENDPOINT
          aws s3 cp .release-matrix/one-point-zero-release-candidate.json "s3://$S3_BUCKET/release-bundles/${{ github.ref_name }}/one-point-zero-release-candidate.json" \
            --endpoint-url $S3_ENDPOINT

      - name: Upload release matrix summary
        uses: actions/upload-artifact@v4
        with:
          name: release-matrix-summary
          path: |
            .release-matrix/release-matrix-summary.md
            .release-matrix/release-matrix-summary.json
            .release-matrix/release-bundle-index.md
            .release-matrix/release-bundle-index.json
            .release-matrix/release-provenance.md
            .release-matrix/release-provenance.json
            .release-matrix/one-point-zero-readiness.md
            .release-matrix/one-point-zero-readiness.json
            .release-matrix/release-status.md
            .release-matrix/release-status.json
            .release-matrix/one-point-zero-freeze.md
            .release-matrix/one-point-zero-freeze.json
            .release-matrix/one-point-zero-decision.md
            .release-matrix/one-point-zero-decision.json
            .release-matrix/one-point-zero-release-candidate.md
            .release-matrix/one-point-zero-release-candidate.json
